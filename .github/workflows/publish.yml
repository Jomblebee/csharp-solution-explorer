name: Publish to VS Marketplace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm install -g @vscode/vsce

      - run: vsce publish --pat ${{ secrets.VSCE_PAT }}
